		services:
  - type: web
    name: n8n-puppeteer
    env: node
    plan: standard
    buildCommand: |
      apt-get update && apt-get install -y \
        chromium \
        fonts-liberation \
        libappindicator3-1 \
        libasound2 \
        libatk-bridge2.0-0 \
        libatk1.0-0 \
        libcups2 \
        libdbus-1-3 \
        libgdk-pixbuf2.0-0 \
        libnspr4 \
        libnss3 \
        libx11-xcb1 \
        libxcomposite1 \
        libxdamage1 \
        libxrandr2 \
				gconf-service \
        libdrm-dev \
        libgconf-2-4 \
        libgtk-3-0 \
        libxss1 \
        libxtst6 \
        xdg-utils \
        --no-install-recommends \
        && rm -rf /var/lib/apt/lists/*
      npm install -g pnpm
      pnpm install
      pnpm build
    startCommand: pnpm start
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        value: KOdHXweFYwOcnLra8Z3WPJYnfFMtvRnJ
      - key: N8N_ENCRYPTION_KEY
        value: utvn3JfusitkERRYu86YFxJ4N3DYKLhPPnRXQxfkc7yaDwgr2ZBq2wNULA0MXzPy
      - key: CHROME_BIN
        value: "/usr/bin/chromium"
      - key: NODE_OPTIONS
        value: "--max_old_space_size=1900"

# Ajoute des variables pour n8n afin de passer les arguments à Puppeteer/Chromium,
      # notamment pour le no-sandbox qui est souvent nécessaire dans des environnements conteneurisés.
      - key: N8N_NODE_DEFAULT_BINARY_PATH # Nouveau, peut aider n8n à trouver Chromium
        value: "/usr/bin/chromium" # Ou /usr/bin/chromium-browser ou /usr/bin/google-chrome

      - key: N8N_ENGINE_CHROMIUM_ARGS # Nouveau, pour passer des arguments à Chromium
        value: "--no-sandbox --disable-setuid-sandbox" # Très important pour les conteneurs

      - key: N8N_PROCESS_MAIN_ARGS # Nouveau, pour s'assurer que n8n utilise ces arguments
        value: "--max-http-header-size=1048576" # Exemple: peut aider avec de gros headers
		
    autoDeploy: true
